<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>なかよしアニマルゲーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:#1a1a2e;
  font-family:'Hiragino Maru Gothic ProN','Hiragino Maru Gothic Pro',sans-serif;
  color:white;overflow:hidden;width:100%;height:100%;
}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes mergeFlash{0%{transform:scale(1)}30%{transform:scale(1.6)}60%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes starBurst{0%{opacity:1;transform:scale(0)}100%{opacity:0;transform:scale(3)}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cell-tile{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;cursor:grab;touch-action:none;overflow:hidden;}
.cell-empty{position:absolute;border-radius:14px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);cursor:pointer;}
button{font-family:inherit;}
#toast{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);border-radius:12px;padding:7px 20px;font-size:13px;font-weight:900;z-index:500;white-space:nowrap;animation:slideDown 0.3s ease;}

/* ずかんモーダル */
#zukan-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;align-items:center;justify-content:center;}
#zukan-modal.open{display:flex;}
#zukan-inner{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:24px;padding:18px;max-width:380px;width:95%;border:2px solid rgba(255,215,0,0.25);max-height:92vh;overflow-y:auto;animation:fadeIn 0.2s ease;}

/* ずかんグリッド */
.zukan-item{
  border-radius:12px;padding:6px 4px;text-align:center;cursor:pointer;
  position:relative;transition:transform 0.15s;
}
.zukan-item:active{transform:scale(0.93);}
.zukan-img-wrap{
  width:52px;height:52px;margin:0 auto;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.zukan-img-wrap img{width:100%;height:100%;object-fit:contain;}
.zukan-cam-badge{
  position:absolute;bottom:0;right:0;
  background:#FFD700;border-radius:50%;
  width:18px;height:18px;font-size:11px;
  display:flex;align-items:center;justify-content:center;
}

/* プレビューモーダル */
#preview-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#preview-modal.open{display:flex;}
#preview-img{width:220px;height:220px;object-fit:contain;border-radius:20px;background:white;}
.preview-name{font-size:18px;font-weight:900;color:#FFD700;}
.preview-btns{display:flex;gap:10px;}
.btn-ok{padding:10px 28px;background:#55EFC4;border:none;border-radius:10px;font-size:14px;font-weight:900;color:#222;cursor:pointer;font-family:inherit;}
.btn-ng{padding:10px 28px;background:rgba(255,255,255,0.15);border:none;border-radius:10px;font-size:14px;font-weight:900;color:white;cursor:pointer;font-family:inherit;}
.btn-del{padding:8px 20px;background:rgba(255,100,100,0.25);border:1px solid rgba(255,100,100,0.4);border-radius:10px;font-size:12px;font-weight:700;color:#ffaaaa;cursor:pointer;font-family:inherit;}
input[type=file]{display:none;}
</style>
</head>
<body>

<!-- ゲーム画面 -->
<div id="hdr" style="padding:12px 16px 6px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#1a1a2e,#16213e);">
  <div style="font-size:18px;font-weight:900;">なかよしアニマルゲーム</div>
  <div style="display:flex;align-items:center;gap:6px;">
    <div style="text-align:right;margin-right:2px;">
      <div style="font-size:9px;color:#a0c4ff;">スコア</div>
      <div id="score-display" style="font-size:20px;font-weight:900;color:#FFD700;line-height:1;">0</div>
    </div>
    <button id="btn-reset" style="background:#FF6B6B;border:none;border-radius:10px;padding:7px 11px;font-size:12px;font-weight:900;color:#fff;cursor:pointer;">🗑</button>
    <button id="btn-save"  style="background:#55EFC4;border:none;border-radius:10px;padding:7px 11px;font-size:12px;font-weight:900;color:#222;cursor:pointer;">💾</button>
    <button id="btn-book"  style="background:#FFD700;border:none;border-radius:10px;padding:7px 11px;font-size:12px;font-weight:900;color:#222;cursor:pointer;">📖 ずかん</button>
  </div>
</div>
<div id="hint" style="margin:0 16px 6px;padding:5px 12px 5px 12px;background:rgba(255,255,255,0.08);border-radius:12px;border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:space-between;gap:8px;">
  <span style="font-size:10px;color:#a0c4ff;">あいているマスをタップ → ハムスター　おなじどうぶつをドラッグしてくっつけよう！</span>
  <button id="btn-hint-close" style="background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:20px;height:20px;font-size:12px;color:#a0c4ff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;">×</button>
</div>
<div id="board-container" style="position:relative;">
  <div id="board" style="position:relative;margin:0 auto;"></div>
</div>
<div id="evbar" style="margin:4px 16px;padding:5px 10px;background:rgba(255,255,255,0.06);border-radius:12px;border:1px solid rgba(255,255,255,0.1);">
  <span style="font-size:9px;color:#a0c4ff;">しんか：</span>
  <span style="font-size:9px;color:white;">ハム→うさぎ→ねこ→きつね→ライオン→おおかみ→くま→ぞう→ドラゴン→ユニコーン</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ずかんモーダル -->
<div id="zukan-modal">
  <div id="zukan-inner">
    <div style="font-size:18px;font-weight:900;color:#FFD700;margin-bottom:4px;text-align:center;">📖 どうぶつずかん</div>
    <div style="font-size:11px;color:#a0c4ff;text-align:center;margin-bottom:12px;">タップして自分のえにかえられるよ 📷</div>
    <div id="zukan-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"></div>
    <div id="zukan-count" style="text-align:center;margin-top:12px;font-size:11px;color:#a0c4ff;"></div>
    <button id="btn-close-book" style="background:rgba(255,255,255,0.12);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:900;color:#aaa;width:100%;margin-top:12px;cursor:pointer;">とじる</button>
  </div>
</div>

<!-- プレビューモーダル -->
<div id="preview-modal">
  <div class="preview-name" id="preview-name"></div>
  <img id="preview-img" src="" alt="">
  <div class="preview-btns">
    <button class="btn-ng" id="btn-ng">やりなおす</button>
    <button class="btn-ok" id="btn-ok">これにする！</button>
  </div>
  <button class="btn-del" id="btn-del">このえをけす</button>
</div>

<input type="file" id="file-input" accept="image/*">

var ANIMALS=[
  {key:"hamster", name:"ハムスター",emoji:"🐹",level:1, bg:"#FDDCCA"},
  {key:"rabbit",  name:"うさぎ",    emoji:"🐰",level:2, bg:"#F0E0E8"},
  {key:"cat",     name:"ねこ",      emoji:"🐱",level:3, bg:"#C0D8F0"},
  {key:"fox",     name:"きつね",    emoji:"🦊",level:4, bg:"#F8C080"},
  {key:"lion",    name:"ライオン",  emoji:"🦁",level:5, bg:"#F8E080"},
  {key:"wolf",    name:"おおかみ",  emoji:"🐺",level:6, bg:"#B0C0D8"},
  {key:"bear",    name:"くま",      emoji:"🐻",level:7, bg:"#C8A060"},
  {key:"elephant",name:"ぞう",      emoji:"🐘",level:8, bg:"#B0D0E8"},
  {key:"dragon",  name:"ドラゴン",  emoji:"🐲",level:9, bg:"#90D0A0"},
  {key:"unicorn", name:"ユニコーン",emoji:"🦄",level:10,bg:"#F0E0F8"},
];
var AMAP={};ANIMALS.forEach(function(a){AMAP[a.key]=a;});
var MERGE_MAP={hamster:"rabbit",rabbit:"cat",cat:"fox",fox:"lion",lion:"wolf",wolf:"bear",bear:"elephant",elephant:"dragon",dragon:"unicorn"};
var SAVE_KEY="nakayoshi-save-v1";
var IMG_KEY="nakayoshi-custom-imgs";
var GRID_COLS=5,GRID_ROWS=7,CELL_SIZE=56;

var customImgs={};
var cells={},discovered=new Set(["hamster"]);
var dragging=null,saveTimer=null,mergeFlashKey=null,mergeFlashTimer=null,shakeCells=new Set();
var score=0;
var currentSlotKey=null,pendingDataURL=null;

var boardEl=document.getElementById("board");
var containerEl=document.getElementById("board-container");

function getImg(key){return customImgs[key]||DEFAULT_IMGS[key]||null;}

function setupBoard(){
  var sw=window.innerWidth||375,sh=window.innerHeight||667;
  var hdrH=document.getElementById("hdr").offsetHeight||58;
  var hintH=document.getElementById("hint").offsetHeight||36;
  var evH=document.getElementById("evbar").offsetHeight||30;
  var availH=sh-hdrH-hintH-evH-12;
  var availW=sw-8;
  var fromH=Math.floor(availH/GRID_ROWS),fromW=Math.floor(availW/GRID_COLS);
  CELL_SIZE=Math.max(40,Math.min(fromH,fromW,110));
  var bw=CELL_SIZE*GRID_COLS,bh=CELL_SIZE*GRID_ROWS;
  boardEl.style.width=bw+"px";boardEl.style.height=bh+"px";
  containerEl.style.height=bh+"px";
}

function makeId(){return Math.random().toString(36).slice(2,8);}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return false;}}
function lsRemove(k){try{localStorage.removeItem(k);}catch(e){}}
function showToast(msg,color){
  color=color||"#55EFC4";
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.background=color;
  t.style.color=(color==="#FFD700"||color==="#55EFC4")?"#111":"#fff";
  t.style.display="block";setTimeout(function(){t.style.display="none";},2400);
}

function buildSave(){return{cells:Object.values(cells).map(function(c){return{r:c.r,c:c.c,t:c.type};}),discovered:Array.from(discovered),score:score};}
function loadSave(){
  var data=lsGet(SAVE_KEY);if(!data)return false;
  try{
    if(data.cells){cells={};data.cells.forEach(function(d){cells[d.r+"-"+d.c]={id:makeId(),type:d.t,r:d.r,c:d.c};});}
    if(Array.isArray(data.discovered))discovered=new Set(data.discovered);
    if(typeof data.score==="number")score=data.score;
    return true;
  }catch(e){return false;}
}
function updateScore(){document.getElementById("score-display").textContent=score;}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){lsSet(SAVE_KEY,buildSave());},500);}

document.getElementById("btn-save").addEventListener("click",function(){
  showToast(lsSet(SAVE_KEY,buildSave())?"✅ ほぞんしたよ！":"❌ ほぞんできなかった…");
});
document.getElementById("btn-reset").addEventListener("click",function(){
  if(!confirm("ほんとうにリセットしますか？"))return;
  lsRemove(SAVE_KEY);discovered=new Set(["hamster"]);score=0;updateScore();
  initGrid();boardEl.innerHTML="";render();
  showToast("🆕 あたらしいゲームをはじめたよ！","#FFD700");
});

/* ── ずかん ── */
function renderZukan(){
  var g=document.getElementById("zukan-grid");g.innerHTML="";
  ANIMALS.forEach(function(a){
    var found=discovered.has(a.key);
    var hasCustom=!!customImgs[a.key];
    var item=document.createElement("div");
    item.className="zukan-item";
    item.style.cssText="background:"+(found?a.bg+"55":"rgba(255,255,255,0.05)")+";border:2px solid "+(found?a.bg+"99":"rgba(255,255,255,0.08)")+";border-radius:12px;padding:6px 4px;text-align:center;cursor:pointer;position:relative;";

    var imgWrap='<div class="zukan-img-wrap" style="background:'+(found?a.bg+"44":"rgba(255,255,255,0.05)")+';border-radius:10px;">';
    if(found){
      var src=getImg(a.key);
      imgWrap += src
        ? '<img src="'+src+'" style="width:100%;height:100%;object-fit:contain;">'
        : '<div style="font-size:28px;line-height:52px;text-align:center;">'+a.emoji+'</div>';
    }else{
      imgWrap += '<div style="font-size:22px;line-height:52px;text-align:center;opacity:0.25;">?</div>';
    }
    // カメラアイコンバッジ（みつけた動物のみ）
    if(found){
      imgWrap += '<div class="zukan-cam-badge">'+( hasCustom ? '✏️' : '📷' )+'</div>';
    }
    imgWrap += '</div>';

    var nameStr='<div style="font-size:8px;font-weight:700;color:'+(found?'white':'#444')+';margin-top:3px;">'+( found ? a.name : '？？？' )+'</div>';
    var lvStr='<div style="font-size:8px;color:#FFD700;">'+a.level+'</div>';
    item.innerHTML=imgWrap+nameStr+lvStr;

    // タップで画像登録（みつけた動物のみ）
    if(found){
      (function(key){
        item.addEventListener("click",function(){
          currentSlotKey=key;
          // 既存画像がある場合はプレビューを先に表示
          if(customImgs[key]){
            document.getElementById("preview-name").textContent=AMAP[key].name;
            document.getElementById("preview-img").src=customImgs[key];
            document.getElementById("btn-del").style.display="block";
            pendingDataURL=customImgs[key];
            document.getElementById("preview-modal").classList.add("open");
          }else{
            document.getElementById("btn-del").style.display="none";
            document.getElementById("file-input").click();
          }
        });
      })(a.key);
    }
    g.appendChild(item);
  });
  document.getElementById("zukan-count").textContent="みつけた: "+discovered.size+" / "+ANIMALS.length;
}

document.getElementById("btn-book").addEventListener("click",function(){
  renderZukan();
  document.getElementById("zukan-modal").classList.add("open");
});
document.getElementById("btn-close-book").addEventListener("click",function(){
  document.getElementById("zukan-modal").classList.remove("open");
});
document.getElementById("zukan-modal").addEventListener("click",function(e){
  if(e.target===this)this.classList.remove("open");
});

/* ── ファイル選択 ── */
document.getElementById("file-input").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    pendingDataURL=ev.target.result;
    document.getElementById("preview-name").textContent=AMAP[currentSlotKey].name;
    document.getElementById("preview-img").src=pendingDataURL;
    document.getElementById("btn-del").style.display="none";
    document.getElementById("preview-modal").classList.add("open");
  };
  reader.readAsDataURL(file);
  this.value="";
});

document.getElementById("btn-ok").addEventListener("click",function(){
  if(!pendingDataURL||!currentSlotKey)return;
  customImgs[currentSlotKey]=pendingDataURL;
  lsSet(IMG_KEY,customImgs);
  boardEl.innerHTML="";render();
  renderZukan();
  document.getElementById("preview-modal").classList.remove("open");
  showToast("🎨 "+AMAP[currentSlotKey].name+"のえをかえたよ！","#D5C5FF");
  pendingDataURL=null;
});
document.getElementById("btn-ng").addEventListener("click",function(){
  document.getElementById("preview-modal").classList.remove("open");
  pendingDataURL=null;
  // 既存画像だった場合は新しい画像を選択しなおせるようにファイル選択を開く
});
document.getElementById("btn-del").addEventListener("click",function(){
  if(!currentSlotKey)return;
  delete customImgs[currentSlotKey];
  lsSet(IMG_KEY,customImgs);
  boardEl.innerHTML="";render();
  renderZukan();
  document.getElementById("preview-modal").classList.remove("open");
  showToast("🗑 "+AMAP[currentSlotKey].name+"のえをけしたよ","#a0c4ff");
  pendingDataURL=null;
});

/* ── グリッド ── */
function initGrid(){
  cells={};var count=0;
  while(count<3){
    var r=Math.floor(Math.random()*GRID_ROWS),c=Math.floor(Math.random()*GRID_COLS);
    var k=r+"-"+c;if(!cells[k]){cells[k]={id:makeId(),type:"hamster",r:r,c:c};count++;}
  }
}

function render(){
  var cur={};Object.values(cells).forEach(function(c){cur[c.id]=true;});
  boardEl.querySelectorAll(".cell-tile").forEach(function(el){if(!cur[el.dataset.id])el.remove();});
  for(var r=0;r<GRID_ROWS;r++)for(var c=0;c<GRID_COLS;c++){
    var k=r+"-"+c;
    if(!boardEl.querySelector('.cell-empty[data-key="'+k+'"]')){
      var emp=document.createElement("div");
      emp.className="cell-empty";emp.setAttribute("data-key",k);
      emp.style.left=(c*CELL_SIZE+2)+"px";emp.style.top=(r*CELL_SIZE+2)+"px";
      emp.style.width=(CELL_SIZE-4)+"px";emp.style.height=(CELL_SIZE-4)+"px";
      (function(rr,cc){emp.addEventListener("click",function(){onCellTap(rr,cc);});})(r,c);
      boardEl.appendChild(emp);
    }
  }
  Object.values(cells).forEach(function(cell){
    var a=AMAP[cell.type];
    var isMerge=(mergeFlashKey===(cell.r+"-"+cell.c));
    var isDragged=(dragging&&dragging.id===cell.id);
    var el=boardEl.querySelector('.cell-tile[data-id="'+cell.id+'"]');
    if(!el){
      el=document.createElement("div");el.className="cell-tile";
      el.setAttribute("data-id",cell.id);el.style.animation="popIn 0.3s ease";
      boardEl.appendChild(el);
      (function(id){el.addEventListener("pointerdown",function(e){onPointerDown(e,id);});})(cell.id);
    }
    var left=isDragged?dragging.curX-CELL_SIZE/2:cell.c*CELL_SIZE+2;
    var top= isDragged?dragging.curY-CELL_SIZE/2:cell.r*CELL_SIZE+2;
    var sz=  isDragged?Math.round(CELL_SIZE*1.1):CELL_SIZE-4;
    el.style.left=left+"px";el.style.top=top+"px";
    el.style.width=sz+"px";el.style.height=sz+"px";
    el.style.background="radial-gradient(circle at 30% 30%,#fff,"+a.bg+")";
    el.style.boxShadow=isDragged?"0 8px 24px rgba(0,0,0,0.4),0 0 0 2px "+a.bg:"0 3px 8px rgba(0,0,0,0.25)";
    el.style.zIndex=isDragged?"100":isMerge?"50":"1";
    el.style.transition=isDragged?"none":"left 0.12s ease,top 0.12s ease";
    if(isMerge)el.style.animation="mergeFlash 0.6s ease";
    else if(shakeCells.has(cell.r+"-"+cell.c))el.style.animation="shake 0.4s ease";
    var imgSz=Math.round(sz*0.76);
    var src=getImg(cell.type);
    var inner=src
      ?'<img src="'+src+'" style="width:'+imgSz+'px;height:'+imgSz+'px;object-fit:contain;pointer-events:none;display:block;">'
      :'<div style="font-size:'+Math.round(imgSz*0.72)+'px;line-height:1;pointer-events:none;">'+a.emoji+'</div>';
    el.innerHTML=inner
      +'<div style="font-size:7px;font-weight:700;color:#333;pointer-events:none;text-align:center;margin-top:1px;">'+a.name+'</div>'
      +'<div style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#FFD700;border-radius:4px;font-size:7px;font-weight:900;padding:1px 3px;pointer-events:none;">'+a.level+'</div>';
    if(isMerge){
      ["✨","⭐","💫","🌟"].forEach(function(s,i){
        var star=document.createElement("div");
        star.style.cssText="position:absolute;font-size:14px;pointer-events:none;animation:starBurst 0.6s ease forwards;animation-delay:"+(i*0.08)+"s;top:"+(30+Math.sin(i*90*Math.PI/180)*30)+"%;left:"+(30+Math.cos(i*90*Math.PI/180)*30)+"%;";
        star.textContent=s;el.appendChild(star);
      });
    }
  });
}

function onCellTap(r,c){
  if(dragging)return;var k=r+"-"+c;if(cells[k])return;
  cells[k]={id:makeId(),type:"hamster",r:r,c:c};
  discovered.add("hamster");scheduleSave();render();
}
function onPointerDown(e,id){
  e.currentTarget.setPointerCapture(e.pointerId);e.preventDefault();
  var cell=null;Object.values(cells).forEach(function(c){if(c.id===id)cell=c;});
  if(!cell)return;
  var rect=boardEl.getBoundingClientRect();
  dragging={id:id,r:cell.r,c:cell.c,curX:e.clientX-rect.left,curY:e.clientY-rect.top};render();
}
boardEl.addEventListener("pointermove",function(e){
  if(!dragging)return;e.preventDefault();
  var rect=boardEl.getBoundingClientRect();
  dragging.curX=e.clientX-rect.left;dragging.curY=e.clientY-rect.top;render();
},{passive:false});
boardEl.addEventListener("pointerup",function(e){
  if(!dragging)return;
  var rect=boardEl.getBoundingClientRect();
  var x=e.clientX-rect.left,y=e.clientY-rect.top;
  var tC=Math.floor(x/CELL_SIZE),tR=Math.floor(y/CELL_SIZE);
  var tKey=tR+"-"+tC,sKey=dragging.r+"-"+dragging.c;
  var src=cells[sKey];
  if(src&&tR>=0&&tR<GRID_ROWS&&tC>=0&&tC<GRID_COLS&&tKey!==sKey){
    var target=cells[tKey];
    if(!target){delete cells[sKey];cells[tKey]={id:src.id,type:src.type,r:tR,c:tC};}
    else if(target.type===src.type&&MERGE_MAP[src.type]){
      var normalNext=MERGE_MAP[src.type];
      var newType=normalNext;
      var isBonus=false;
      // 10%でボーナス：進化先より2〜3レベル上をランダムで
      if(Math.random()<0.10){
        var keys=Object.keys(AMAP);
        var normalLv=AMAP[normalNext].level;
        var bonusCandidates=keys.filter(function(k){
          return AMAP[k].level>=normalLv+2 && AMAP[k].level<=normalLv+3;
        });
        if(bonusCandidates.length>0){
          newType=bonusCandidates[Math.floor(Math.random()*bonusCandidates.length)];
          isBonus=true;
        }
      }
      delete cells[sKey];cells[tKey]={id:makeId(),type:newType,r:tR,c:tC};
      mergeFlashKey=tKey;discovered.add(newType);
      score+=AMAP[newType].level*(isBonus?30:10);updateScore();
      clearTimeout(mergeFlashTimer);
      mergeFlashTimer=setTimeout(function(){mergeFlashKey=null;render();},600);
      if(isBonus){
        showToast("🎉 ラッキー！ "+AMAP[newType].name+"があらわれた！","#FF6FD8");
      }else{
        showToast(AMAP[newType].name+"があらわれた！","#FFD700");
      }
    }else{
      shakeCells.add(tKey);render();
      setTimeout(function(){shakeCells.delete(tKey);render();},400);
    }
    scheduleSave();
  }
  dragging=null;render();
});

window.addEventListener("load",function(){
  var saved=lsGet(IMG_KEY);if(saved)customImgs=saved;
  // ヒント非表示チェック
  if(lsGet("nakayoshi-hint-closed")){
    var h=document.getElementById("hint");
    if(h)h.style.display="none";
  }
  document.getElementById("btn-hint-close").addEventListener("click",function(){
    var h=document.getElementById("hint");
    if(h)h.style.display="none";
    lsSet("nakayoshi-hint-closed",true);
  });
  setupBoard();
  var loaded=loadSave();
  if(!loaded)initGrid();
  updateScore();
  render();
  if(loaded)showToast("📂 まえのつづきをよみこんだよ！","#a0c4ff");
});
</script>
</body>
</html>
