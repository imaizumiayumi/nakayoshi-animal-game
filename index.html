<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>なかよしアニマルゲーム</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #1a1a2e url('assets/images/bg.png') center center / cover no-repeat fixed;
  font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Maru Gothic Pro', sans-serif;
  color: white;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

@keyframes popIn      { 0%   { transform: scale(0);    opacity: 0 }
                         70%  { transform: scale(1.3)              }
                         100% { transform: scale(1);    opacity: 1 } }
@keyframes mergeFlash { 0%   { transform: scale(1)   }
                         30%  { transform: scale(1.6)  }
                         60%  { transform: scale(0.9)  }
                         100% { transform: scale(1)   } }
@keyframes shake      { 0%, 100% { transform: translateX(0)   }
                         25%      { transform: translateX(-6px) }
                         75%      { transform: translateX(6px)  } }
@keyframes starBurst  { 0%   { opacity: 1; transform: scale(0) }
                         100% { opacity: 0; transform: scale(3) } }
@keyframes luckyFloatL { 0%   { opacity: 1; transform: translate(0, 0) scale(0.8)     }
                          60%  { opacity: 1                                             }
                          100% { opacity: 0; transform: translate(-18px, -44px) scale(1.1) } }
@keyframes luckyFloatC { 0%   { opacity: 1; transform: translate(0, 0) scale(0.8)    }
                          60%  { opacity: 1                                            }
                          100% { opacity: 0; transform: translate(0, -52px) scale(1.2) } }
@keyframes luckyFloatR { 0%   { opacity: 1; transform: translate(0, 0) scale(0.8)    }
                          60%  { opacity: 1                                            }
                          100% { opacity: 0; transform: translate(18px, -44px) scale(1.1) } }
@keyframes slideDown  { from { opacity: 0; transform: translateX(-50%) translateY(-10px) }
                         to   { opacity: 1; transform: translateX(-50%) translateY(0)     } }
@keyframes fadeIn     { from { opacity: 0; transform: translateY(10px) }
                         to   { opacity: 1; transform: none             } }

/* Layout */
#hdr {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
}
.hdr-title { font-size: 18px; font-weight: 900; }
.hdr-right  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.score-wrap  { text-align: right; margin-right: 2px; min-width: 0; }
.score-label { font-size: 9px; color: #9C6943; white-space: nowrap; }
#score-display { font-size: 16px; font-weight: 900; color: #9C6943; line-height: 1; word-break: break-all; }

.hdr-btn {
  border: none;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s ease;
}
.hdr-btn:hover { opacity: 0.7; }
.hdr-btn:active { opacity: 0.5; }
#btn-reset {
  background: #FFEDE7;
  color: #E86F3B;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}
#btn-save {
  background: #E7F5FF;
  color: #4695D0;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}
#btn-book {
  background: #4DB971;
  color: #fff;
  border-radius: 12px;
  padding: 0 16px;
  height: 40px;
  font-size: 14px;
  font-weight: 900;
  gap: 4px;
}

#hint {
  margin: 0 16px 6px;
  padding: 5px 12px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid rgba(0, 0, 0, 0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.hint-text { font-size: 10px; color: #a0c4ff; }
#btn-hint-close {
  background: rgba(255, 255, 255, 0.15);
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 12px;
  color: #a0c4ff;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  font-family: inherit;
}

#board-container { position: relative; margin-top: 12px; }
#board            { position: relative; margin: 0 auto; }

#evbar {
  margin: 4px 16px;
  padding: 5px 10px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.evbar-label { font-size: 9px; color: white; }
.evbar-text  { font-size: 9px; color: white; }

/* Tile and empty cell */
.cell-tile {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  cursor: grab;
  touch-action: none;
  overflow: hidden;
}
.cell-empty {
  position: absolute;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.18);
  border: 1.5px solid rgba(255, 255, 255, 0.3);
  cursor: pointer;
}

button { font-family: inherit; }

/* Toast */
#toast {
  display: none;
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 12px;
  padding: 7px 20px;
  font-size: 13px;
  font-weight: 900;
  z-index: 500;
  white-space: nowrap;
  animation: slideDown 0.3s ease;
}

/* ずかんモーダル */
#zukan-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
#zukan-modal.open { display: flex; }
#zukan-inner {
  background: #fff;
  border-radius: 24px;
  padding: 20px 12px 16px;
  max-width: 380px;
  width: 95%;
  border: none;
  max-height: 92vh;
  overflow-y: auto;
  animation: fadeIn 0.2s ease;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
}
.zukan-title       { font-size: 18px; font-weight: 900; color: #333; margin-bottom: 4px; text-align: center; }
.zukan-subtitle    { font-size: 11px; color: #999; text-align: center; margin-bottom: 12px; }
#zukan-grid        { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
#zukan-count       { text-align: center; margin-top: 12px; font-size: 11px; color: #999; }
#btn-close-book {
  background: #4DB971;
  border: none;
  border-radius: 12px;
  padding: 10px;
  font-size: 13px;
  font-weight: 900;
  color: #fff;
  width: 100%;
  margin-top: 12px;
  cursor: pointer;
}

/* ずかんグリッドアイテム */
.zukan-item {
  border-radius: 12px;
  padding: 6px 4px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.15s;
}
.zukan-item:active { transform: scale(0.93); }
.zukan-img-wrap {
  width: 52px;
  height: 52px;
  margin: 0 auto;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.zukan-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
.zukan-cam-badge {
  position: absolute;
  bottom: 0;
  right: 0;
  background: #4695D0;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.zukan-name { font-size: 8px; font-weight: 700; margin-top: 3px; }
.zukan-level { font-size: 8px; color: #9C6943; }

/* プレビューモーダル */
#preview-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.94);
  z-index: 400;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
}
#preview-modal.open { display: flex; }
#preview-img { width: 220px; height: 220px; object-fit: contain; border-radius: 20px; background: white; }
.preview-name { font-size: 18px; font-weight: 900; color: #FFD700; }
.preview-btns { display: flex; gap: 10px; }
.btn-ok  { padding: 10px 28px; background: #55EFC4;                     border: none;                               border-radius: 10px; font-size: 14px; font-weight: 900; color: #222;     cursor: pointer; font-family: inherit; }
.btn-ng  { padding: 10px 28px; background: rgba(255, 255, 255, 0.15);   border: none;                               border-radius: 10px; font-size: 14px; font-weight: 900; color: white;    cursor: pointer; font-family: inherit; }
.btn-del { padding: 8px  20px; background: rgba(255, 100, 100, 0.25);   border: 1px solid rgba(255, 100, 100, 0.4); border-radius: 10px; font-size: 12px; font-weight: 700; color: #ffaaaa; cursor: pointer; font-family: inherit; }
input[type=file] { display: none; }
</style>
</head>
<body>

<!-- ゲーム画面 -->
<div id="hdr">
  <img src="assets/images/logo2.svg" alt="なかよしアニマルゲーム" style="height:auto;max-height:60px;object-fit:contain;flex-shrink:0;align-self:stretch;">
  <div class="hdr-right">
    <div class="score-wrap">
      <div class="score-label">スコア</div>
      <div id="score-display">0</div>
    </div>
    <button id="btn-reset" class="hdr-btn"><span class="material-icons" style="font-size:20px;">delete</span></button>
    <button id="btn-save"  class="hdr-btn"><span class="material-icons" style="font-size:20px;">save</span></button>
    <button id="btn-book"  class="hdr-btn">ずかん</button>
  </div>
</div>
<div id="hint">
  <span class="hint-text">あいているマスをタップ → ハムスター　おなじどうぶつをドラッグしてくっつけよう！</span>
  <button id="btn-hint-close">×</button>
</div>
<div id="board-container">
  <div id="board"></div>
</div>
<div id="evbar">
  <span class="evbar-label">しんか：</span>
  <span class="evbar-text">ハム→うさぎ→ねこ→きつね→ライオン→おおかみ→くま→ぞう→ドラゴン→ユニコーン</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ずかんモーダル -->
<div id="zukan-modal">
  <div id="zukan-inner">
    <div class="zukan-title">📖 どうぶつずかん</div>
    <div class="zukan-subtitle">タップして自分のえにかえられるよ 📷</div>
    <div id="zukan-grid"></div>
    <div id="zukan-count"></div>
    <button id="btn-close-book">とじる</button>
  </div>
</div>

<!-- プレビューモーダル -->
<div id="preview-modal">
  <div class="preview-name" id="preview-name"></div>
  <img id="preview-img" src="" alt="">
  <div class="preview-btns">
    <button class="btn-ng" id="btn-ng">やりなおす</button>
    <button class="btn-ok" id="btn-ok">これにする！</button>
  </div>
  <button class="btn-del" id="btn-del">このえをけす</button>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
/* ── 定数 ── */
var DEFAULT_IMGS = {
  hamster:  "assets/images/Frame 1.png",
  rabbit:   "assets/images/Frame 2.png",
  cat:      "assets/images/Frame 3.png",
  fox:      "assets/images/Frame 4.png",
  lion:     "assets/images/Frame 5.png",
  wolf:     "assets/images/Frame 6.png",
  bear:     "assets/images/Frame 7.png",
  elephant: "assets/images/Frame 8.png",
  dragon:   "assets/images/Frame 9.png",
  unicorn:  "assets/images/Frame 10.png",
};

var ANIMALS = [
  { key: "hamster",  name: "ハムスター", emoji: "🐹", level: 1,  bg: "#FDDCCA" },
  { key: "rabbit",   name: "うさぎ",     emoji: "🐰", level: 2,  bg: "#F0E0E8" },
  { key: "cat",      name: "ねこ",       emoji: "🐱", level: 3,  bg: "#C0D8F0" },
  { key: "fox",      name: "きつね",     emoji: "🦊", level: 4,  bg: "#F8C080" },
  { key: "lion",     name: "ライオン",   emoji: "🦁", level: 5,  bg: "#F8E080" },
  { key: "wolf",     name: "おおかみ",   emoji: "🐺", level: 6,  bg: "#B0C0D8" },
  { key: "bear",     name: "くま",       emoji: "🐻", level: 7,  bg: "#C8A060" },
  { key: "elephant", name: "ぞう",       emoji: "🐘", level: 8,  bg: "#B0D0E8" },
  { key: "dragon",   name: "ドラゴン",   emoji: "🐲", level: 9,  bg: "#90D0A0" },
  { key: "unicorn",  name: "ユニコーン", emoji: "🦄", level: 10, bg: "#F0E0F8" },
];

var ANIMAL_MAP = {};
ANIMALS.forEach(function(animal) { ANIMAL_MAP[animal.key] = animal; });

var MERGE_MAP = {
  hamster:  "rabbit",
  rabbit:   "cat",
  cat:      "fox",
  fox:      "lion",
  lion:     "wolf",
  wolf:     "bear",
  bear:     "elephant",
  elephant: "dragon",
  dragon:   "unicorn",
};

var SAVE_KEY       = "nakayoshi-save-v1";
var IMG_KEY        = "nakayoshi-custom-imgs";
var HINT_CLOSED_KEY = "nakayoshi-hint-closed";
var GRID_COLS = 5, GRID_ROWS = 7, CELL_SIZE = 56;

/* ── 状態 ── */
var customImgs   = {};
var cells        = {};
var discovered   = new Set(["hamster"]);
var dragging     = null;
var saveTimer    = null;
var mergeFlashKey   = null;
var mergeFlashTimer = null;
var shakeCells      = new Set();
var luckyFlashKey   = null;
var luckyFlashTimer = null;
var score           = 0;
var currentSlotKey  = null;
var pendingDataURL  = null;

/* ── DOM references ── */
var boardEl     = document.getElementById("board");
var containerEl = document.getElementById("board-container");

/* ── ユーティリティ ── */
function getImg(animalKey) {
  return customImgs[animalKey] || DEFAULT_IMGS[animalKey] || null;
}

function makeId() {
  return Math.random().toString(36).slice(2, 8);
}

function cellKey(row, col) {
  return row + "-" + col;
}

function lsGet(storageKey) {
  try {
    var value = localStorage.getItem(storageKey);
    return value ? JSON.parse(value) : null;
  } catch (e) { return null; }
}

function lsSet(storageKey, value) {
  try { localStorage.setItem(storageKey, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}

function lsRemove(storageKey) {
  try { localStorage.removeItem(storageKey); } catch (e) {}
}

function showToast(message, color) {
  color = color || "#55EFC4";
  var toastEl = document.getElementById("toast");
  toastEl.textContent = message;
  toastEl.style.background = color;
  toastEl.style.color = (color === "#FFD700" || color === "#55EFC4") ? "#553B1F" : "#fff";
  toastEl.style.display = "block";
  setTimeout(function() { toastEl.style.display = "none"; }, 2400);
}

/* ── セーブ / ロード ── */
function buildSave() {
  return {
    cells: Object.values(cells).map(function(cell) {
      return { r: cell.r, c: cell.c, t: cell.type };
    }),
    discovered: Array.from(discovered),
    score: score,
  };
}

function loadSave() {
  var data = lsGet(SAVE_KEY);
  if (!data) return false;
  try {
    if (data.cells) {
      cells = {};
      data.cells.forEach(function(saved) {
        cells[cellKey(saved.r, saved.c)] = { id: makeId(), type: saved.t, r: saved.r, c: saved.c };
      });
    }
    if (Array.isArray(data.discovered)) discovered = new Set(data.discovered);
    if (typeof data.score === "number") score = data.score;
    return true;
  } catch (e) { return false; }
}

function updateScore() {
  document.getElementById("score-display").textContent = score;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() { lsSet(SAVE_KEY, buildSave()); }, 500);
}

/* ── ボードセットアップ ── */
function setupBoard() {
  var screenW = window.innerWidth  || 375;
  var screenH = window.innerHeight || 667;
  var hdrH    = document.getElementById("hdr").offsetHeight   || 58;
  var hintH   = document.getElementById("hint").offsetHeight  || 36;
  var evbarH  = document.getElementById("evbar").offsetHeight || 30;
  var availH  = screenH - hdrH - hintH - evbarH - 12;
  var availW  = screenW - 8;
  var fromH   = Math.floor(availH / GRID_ROWS);
  var fromW   = Math.floor(availW / GRID_COLS);
  CELL_SIZE   = Math.max(40, Math.min(fromH, fromW, 110));
  var boardW  = CELL_SIZE * GRID_COLS;
  var boardH  = CELL_SIZE * GRID_ROWS;
  boardEl.style.width       = boardW + "px";
  boardEl.style.height      = boardH + "px";
  containerEl.style.height  = boardH + "px";
}

function initGrid() {
  cells = {};
  var placed = 0;
  while (placed < 3) {
    var row = Math.floor(Math.random() * GRID_ROWS);
    var col = Math.floor(Math.random() * GRID_COLS);
    var key = cellKey(row, col);
    if (!cells[key]) {
      cells[key] = { id: makeId(), type: "hamster", r: row, c: col };
      placed++;
    }
  }
}

/* ── レンダリング ── */
function renderEmptyCells() {
  for (var row = 0; row < GRID_ROWS; row++) {
    for (var col = 0; col < GRID_COLS; col++) {
      var key = cellKey(row, col);
      if (!boardEl.querySelector('.cell-empty[data-key="' + key + '"]')) {
        var emptyEl = document.createElement("div");
        emptyEl.className = "cell-empty";
        emptyEl.setAttribute("data-key", key);
        emptyEl.style.left   = (col * CELL_SIZE + 2) + "px";
        emptyEl.style.top    = (row * CELL_SIZE + 2) + "px";
        emptyEl.style.width  = (CELL_SIZE - 4) + "px";
        emptyEl.style.height = (CELL_SIZE - 4) + "px";
        (function(r, c) {
          emptyEl.addEventListener("click", function() { onCellTap(r, c); });
        })(row, col);
        boardEl.appendChild(emptyEl);
      }
    }
  }
}

function buildTileImageHTML(animalType, tileSize) {
  var imgSize = Math.round(tileSize * 0.88);
  var src = getImg(animalType);
  if (src) {
    return '<img src="' + src + '" style="width:' + imgSize + 'px;height:' + imgSize + 'px;object-fit:contain;pointer-events:none;display:block;">';
  }
  var fontSize = Math.round(imgSize * 0.72);
  return '<div style="font-size:' + fontSize + 'px;line-height:1;pointer-events:none;">' + ANIMAL_MAP[animalType].emoji + '</div>';
}

function buildTileHTML(animalType, tileSize) {
  var animal = ANIMAL_MAP[animalType];
  return buildTileImageHTML(animalType, tileSize)
    + '<div style="position:absolute;top:4px;right:4px;background:#fff;color:#555;border-radius:8px;font-size:7px;font-weight:900;padding:2px 5px;pointer-events:none;">' + animal.level + '</div>';
}

function appendMergeStars(tileEl) {
  ["✨", "⭐", "💫", "🌟"].forEach(function(starEmoji, index) {
    var star = document.createElement("div");
    var topPct  = 30 + Math.sin(index * 90 * Math.PI / 180) * 30;
    var leftPct = 30 + Math.cos(index * 90 * Math.PI / 180) * 30;
    star.style.cssText = "position:absolute;font-size:14px;pointer-events:none;"
      + "animation:starBurst 0.6s ease forwards;"
      + "animation-delay:" + (index * 0.08) + "s;"
      + "top:" + topPct + "%;left:" + leftPct + "%;";
    star.textContent = starEmoji;
    tileEl.appendChild(star);
  });
}

function appendLuckyIcons(tileEl) {
  var icons = [
    { symbol: "❤️", animation: "luckyFloatL", delay: 0,   left: "25%" },
    { symbol: "🎁", animation: "luckyFloatC", delay: 0.1, left: "50%" },
    { symbol: "❤️", animation: "luckyFloatR", delay: 0.2, left: "75%" },
  ];
  icons.forEach(function(iconDef) {
    var iconEl = document.createElement("div");
    iconEl.style.cssText = "position:absolute;font-size:15px;pointer-events:none;"
      + "bottom:8px;left:" + iconDef.left + ";transform:translateX(-50%);"
      + "animation:" + iconDef.animation + " 1.1s ease forwards;"
      + "animation-delay:" + iconDef.delay + "s;opacity:0;";
    iconEl.textContent = iconDef.symbol;
    tileEl.appendChild(iconEl);
  });
}

function renderTile(cell) {
  var animal      = ANIMAL_MAP[cell.type];
  var tileKey     = cellKey(cell.r, cell.c);
  var isMerging   = (mergeFlashKey === tileKey);
  var isDragged   = (dragging && dragging.id === cell.id);

  var tileEl = boardEl.querySelector('.cell-tile[data-id="' + cell.id + '"]');
  if (!tileEl) {
    tileEl = document.createElement("div");
    tileEl.className = "cell-tile";
    tileEl.setAttribute("data-id", cell.id);
    tileEl.style.animation = "popIn 0.3s ease";
    boardEl.appendChild(tileEl);
    (function(id) {
      tileEl.addEventListener("pointerdown", function(e) { onPointerDown(e, id); });
    })(cell.id);
  }

  var left   = isDragged ? dragging.curX - CELL_SIZE / 2 : cell.c * CELL_SIZE + 2;
  var top    = isDragged ? dragging.curY - CELL_SIZE / 2 : cell.r * CELL_SIZE + 2;
  var size   = isDragged ? Math.round(CELL_SIZE * 1.1)   : CELL_SIZE - 4;

  tileEl.style.left       = left + "px";
  tileEl.style.top        = top  + "px";
  tileEl.style.width      = size + "px";
  tileEl.style.height     = size + "px";
  tileEl.style.background = "radial-gradient(circle at 30% 30%,#fff," + animal.bg + ")";
  tileEl.style.boxShadow  = isDragged
    ? "0 8px 24px rgba(0,0,0,0.4),0 0 0 2px " + animal.bg
    : "0 3px 8px rgba(0,0,0,0.25)";
  tileEl.style.zIndex     = isDragged ? "100" : isMerging ? "50" : "1";
  tileEl.style.transition = isDragged ? "none" : "left 0.12s ease,top 0.12s ease";

  if (isMerging)                           tileEl.style.animation = "mergeFlash 0.6s ease";
  else if (shakeCells.has(tileKey))        tileEl.style.animation = "shake 0.4s ease";

  tileEl.innerHTML = buildTileHTML(cell.type, size);

  if (isMerging)                           appendMergeStars(tileEl);
  if (luckyFlashKey === tileKey)           appendLuckyIcons(tileEl);
}

function render() {
  // Remove tiles for cells that no longer exist
  var activeCellIds = {};
  Object.values(cells).forEach(function(cell) { activeCellIds[cell.id] = true; });
  boardEl.querySelectorAll(".cell-tile").forEach(function(tileEl) {
    if (!activeCellIds[tileEl.dataset.id]) tileEl.remove();
  });

  renderEmptyCells();

  Object.values(cells).forEach(function(cell) { renderTile(cell); });
}

/* ── タップとドラッグ ── */
function onCellTap(row, col) {
  if (dragging) return;
  var key = cellKey(row, col);
  if (cells[key]) return;
  cells[key] = { id: makeId(), type: "hamster", r: row, c: col };
  discovered.add("hamster");
  scheduleSave();
  render();
}

function onPointerDown(e, cellId) {
  e.currentTarget.setPointerCapture(e.pointerId);
  e.preventDefault();
  var cell = null;
  Object.values(cells).forEach(function(c) { if (c.id === cellId) cell = c; });
  if (!cell) return;
  var boardRect = boardEl.getBoundingClientRect();
  dragging = {
    id:   cellId,
    r:    cell.r,
    c:    cell.c,
    curX: e.clientX - boardRect.left,
    curY: e.clientY - boardRect.top,
  };
  render();
}

boardEl.addEventListener("pointermove", function(e) {
  if (!dragging) return;
  e.preventDefault();
  var boardRect = boardEl.getBoundingClientRect();
  dragging.curX = e.clientX - boardRect.left;
  dragging.curY = e.clientY - boardRect.top;
  render();
}, { passive: false });

/* ── マージ処理 ── */
function pickBonusAnimalKey(normalNextKey) {
  var normalLevel    = ANIMAL_MAP[normalNextKey].level;
  var bonusCandidates = Object.keys(ANIMAL_MAP).filter(function(key) {
    return ANIMAL_MAP[key].level >= normalLevel + 2 && ANIMAL_MAP[key].level <= normalLevel + 3;
  });
  if (bonusCandidates.length === 0) return null;
  return bonusCandidates[Math.floor(Math.random() * bonusCandidates.length)];
}

function getEmptyCells() {
  var empty = [];
  for (var row = 0; row < GRID_ROWS; row++) {
    for (var col = 0; col < GRID_COLS; col++) {
      var key = cellKey(row, col);
      if (!cells[key]) empty.push({ r: row, c: col, key: key });
    }
  }
  return empty;
}

function spawnBonusAnimal(bonusKey) {
  var emptyCells = getEmptyCells();
  if (emptyCells.length === 0) return;
  var pick = emptyCells[Math.floor(Math.random() * emptyCells.length)];
  cells[pick.key] = { id: makeId(), type: bonusKey, r: pick.r, c: pick.c };
  discovered.add(bonusKey);
  score += ANIMAL_MAP[bonusKey].level * 30;
  luckyFlashKey = pick.key;
  clearTimeout(luckyFlashTimer);
  luckyFlashTimer = setTimeout(function() { luckyFlashKey = null; render(); }, 1200);
}

function doMerge(sourceKey, targetRow, targetCol, sourceCell) {
  var targetKey  = cellKey(targetRow, targetCol);
  var normalNext = MERGE_MAP[sourceCell.type];

  delete cells[sourceKey];
  cells[targetKey] = { id: makeId(), type: normalNext, r: targetRow, c: targetCol };
  mergeFlashKey = targetKey;
  discovered.add(normalNext);
  score += ANIMAL_MAP[normalNext].level * 10;

  var isBonus    = Math.random() < 0.10;
  var bonusKey   = isBonus ? pickBonusAnimalKey(normalNext) : null;
  isBonus        = isBonus && bonusKey !== null;

  if (isBonus) spawnBonusAnimal(bonusKey);

  updateScore();
  clearTimeout(mergeFlashTimer);
  mergeFlashTimer = setTimeout(function() { mergeFlashKey = null; render(); }, 600);

  if (isBonus) {
    showToast("ラッキー！ " + ANIMAL_MAP[bonusKey].name + "があらわれた！", "#FF6FD8");
  } else {
    showToast(ANIMAL_MAP[normalNext].name + "があらわれた！", "#FFD700");
  }
}

boardEl.addEventListener("pointerup", function(e) {
  if (!dragging) return;
  var boardRect = boardEl.getBoundingClientRect();
  var dropX = e.clientX - boardRect.left;
  var dropY = e.clientY - boardRect.top;
  var targetCol = Math.floor(dropX / CELL_SIZE);
  var targetRow = Math.floor(dropY / CELL_SIZE);
  var targetKey = cellKey(targetRow, targetCol);
  var sourceKey = cellKey(dragging.r, dragging.c);
  var sourceCell = cells[sourceKey];

  if (sourceCell && targetRow >= 0 && targetRow < GRID_ROWS && targetCol >= 0 && targetCol < GRID_COLS && targetKey !== sourceKey) {
    var targetCell = cells[targetKey];
    if (!targetCell) {
      // Move to empty cell
      delete cells[sourceKey];
      cells[targetKey] = { id: sourceCell.id, type: sourceCell.type, r: targetRow, c: targetCol };
    } else if (targetCell.type === sourceCell.type && MERGE_MAP[sourceCell.type]) {
      // Merge matching animals
      doMerge(sourceKey, targetRow, targetCol, sourceCell);
    } else {
      // Invalid drop — shake the target
      shakeCells.add(targetKey);
      render();
      setTimeout(function() { shakeCells.delete(targetKey); render(); }, 400);
    }
    scheduleSave();
  }

  dragging = null;
  render();
});

/* ── ずかんモーダル ── */
function buildZukanItemHTML(animal, isFound, hasCustomImg) {
  var imgWrapBg = isFound ? animal.bg + "44" : "#f5f5f5";
  var imgWrap = '<div class="zukan-img-wrap" style="background:' + imgWrapBg + ';">';

  if (isFound) {
    var src = getImg(animal.key);
    imgWrap += src
      ? '<img src="' + src + '">'
      : '<div style="font-size:28px;line-height:52px;text-align:center;">' + animal.emoji + '</div>';
    imgWrap += '<div class="zukan-cam-badge"><span class="material-icons" style="font-size:13px;color:#fff;">' + (hasCustomImg ? 'edit' : 'photo_camera') + '</span></div>';
  } else {
    imgWrap += '<div style="font-size:22px;line-height:52px;text-align:center;opacity:0.25;">?</div>';
  }
  imgWrap += '</div>';

  var nameText  = isFound ? animal.name : '？？？';
  var nameColor = isFound ? '#333'      : '#bbb';
  var nameHTML  = '<div class="zukan-name" style="color:' + nameColor + ';">' + nameText + '</div>';
  var levelHTML = '<div class="zukan-level">' + animal.level + '</div>';

  return imgWrap + nameHTML + levelHTML;
}

function renderZukan() {
  var gridEl = document.getElementById("zukan-grid");
  gridEl.innerHTML = "";

  ANIMALS.forEach(function(animal) {
    var isFound     = discovered.has(animal.key);
    var hasCustomImg = !!customImgs[animal.key];

    var itemEl = document.createElement("div");
    itemEl.className = "zukan-item";
    itemEl.style.background = isFound ? animal.bg + "55" : "#f7f7f7";
    itemEl.style.border      = "2px solid " + (isFound ? animal.bg + "99" : "#e8e8e8");
    itemEl.innerHTML = buildZukanItemHTML(animal, isFound, hasCustomImg);

    if (isFound) {
      (function(animalKey) {
        itemEl.addEventListener("click", function() { onZukanItemClick(animalKey); });
      })(animal.key);
    }

    gridEl.appendChild(itemEl);
  });

  document.getElementById("zukan-count").textContent = "みつけた: " + discovered.size + " / " + ANIMALS.length;
}

function onZukanItemClick(animalKey) {
  currentSlotKey = animalKey;
  if (customImgs[animalKey]) {
    // Show existing custom image in preview first
    document.getElementById("preview-name").textContent = ANIMAL_MAP[animalKey].name;
    document.getElementById("preview-img").src          = customImgs[animalKey];
    document.getElementById("btn-del").style.display    = "block";
    pendingDataURL = customImgs[animalKey];
    document.getElementById("preview-modal").classList.add("open");
  } else {
    document.getElementById("btn-del").style.display = "none";
    document.getElementById("file-input").click();
  }
}

function closePreviewModal() {
  document.getElementById("preview-modal").classList.remove("open");
  pendingDataURL = null;
}

function applyCustomImage() {
  if (!pendingDataURL || !currentSlotKey) return;
  customImgs[currentSlotKey] = pendingDataURL;
  lsSet(IMG_KEY, customImgs);
  render();
  renderZukan();
  closePreviewModal();
  showToast(ANIMAL_MAP[currentSlotKey].name + "のえをかえたよ！", "#D5C5FF");
}

function deleteCustomImage() {
  if (!currentSlotKey) return;
  delete customImgs[currentSlotKey];
  lsSet(IMG_KEY, customImgs);
  render();
  renderZukan();
  closePreviewModal();
  showToast(ANIMAL_MAP[currentSlotKey].name + "のえをけしたよ", "#a0c4ff");
}

/* ── イベントリスナー ── */
document.getElementById("btn-save").addEventListener("click", function() {
  var saved = lsSet(SAVE_KEY, buildSave());
  showToast(saved ? "ほぞんしたよ！" : "ほぞんできなかった…", "#4695D0");
});

document.getElementById("btn-reset").addEventListener("click", function() {
  if (!confirm("ほんとうにリセットしますか？")) return;
  lsRemove(SAVE_KEY);
  discovered = new Set(["hamster"]);
  score = 0;
  updateScore();
  initGrid();
  boardEl.innerHTML = "";
  render();
  showToast("あたらしいゲームをはじめたよ！", "#FFD700");
});

document.getElementById("btn-book").addEventListener("click", function() {
  renderZukan();
  document.getElementById("zukan-modal").classList.add("open");
});
document.getElementById("btn-close-book").addEventListener("click", function() {
  document.getElementById("zukan-modal").classList.remove("open");
});
document.getElementById("zukan-modal").addEventListener("click", function(e) {
  if (e.target === this) this.classList.remove("open");
});

document.getElementById("file-input").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    pendingDataURL = ev.target.result;
    document.getElementById("preview-name").textContent    = ANIMAL_MAP[currentSlotKey].name;
    document.getElementById("preview-img").src             = pendingDataURL;
    document.getElementById("btn-del").style.display       = "none";
    document.getElementById("preview-modal").classList.add("open");
  };
  reader.readAsDataURL(file);
  this.value = "";
});

document.getElementById("btn-ok").addEventListener("click",  applyCustomImage);
document.getElementById("btn-ng").addEventListener("click",  closePreviewModal);
document.getElementById("btn-del").addEventListener("click", deleteCustomImage);

/* ── 起動 ── */
window.addEventListener("load", function() {
  var savedImgs = lsGet(IMG_KEY);
  if (savedImgs) customImgs = savedImgs;

  if (lsGet(HINT_CLOSED_KEY)) {
    var hintEl = document.getElementById("hint");
    if (hintEl) hintEl.style.display = "none";
  }
  document.getElementById("btn-hint-close").addEventListener("click", function() {
    var hintEl = document.getElementById("hint");
    if (hintEl) hintEl.style.display = "none";
    lsSet(HINT_CLOSED_KEY, true);
  });

  setupBoard();
  var loaded = loadSave();
  if (!loaded) initGrid();
  updateScore();
  render();
  if (loaded) showToast("まえのつづきをよみこんだよ！", "#a0c4ff");
});
</script>
</body>
